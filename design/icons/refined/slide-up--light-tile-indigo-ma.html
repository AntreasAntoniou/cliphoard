<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yank</title>
<style>
  html,body{margin:0;padding:0;}
  body{width:512px;height:512px;overflow:hidden;background:transparent;}
  svg{display:block;}
</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FBFCFE"/>
      <stop offset="1" stop-color="#E6EAF2"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6D7BFF"/>
      <stop offset="1" stop-color="#4A3BD8"/>
    </linearGradient>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#1A2240" flood-opacity="0.22"/>
    </filter>
    <filter id="barGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#4A3BD8" flood-opacity="0.30"/>
    </filter>
    <clipPath id="tileClip">
      <rect x="40" y="32" width="432" height="432" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <g filter="url(#tileShadow)">
    <rect x="40" y="32" width="432" height="432" rx="96" ry="96" fill="url(#tile)"/>
  </g>

  <g clip-path="url(#tileClip)">
    <rect x="40" y="32" width="432" height="432" rx="96" ry="96" fill="url(#sheen)"/>

    <rect x="196" y="392" width="120" height="26" rx="13" fill="#4A3BD8" opacity="0.12"/>
    <rect x="176" y="350" width="160" height="30" rx="15" fill="#4A3BD8" opacity="0.22"/>

    <g filter="url(#barGlow)">
      <rect x="216" y="216" width="80" height="120" rx="34" fill="url(#bar)"/>
      <path d="M256 132 L348 240 Q358 252 342 252 L170 252 Q154 252 164 240 Z" fill="url(#bar)"/>
    </g>
  </g>
</svg>
</body>
</html>
