<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yank</title>
<style>
  html,body{margin:0;padding:0;}
  body{width:512px;height:512px;overflow:hidden;background:transparent;}
  svg{display:block;}
</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Yank app icon">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#24222C"/>
      <stop offset="0.5" stop-color="#15131A"/>
      <stop offset="1" stop-color="#070608"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.30" cy="0.18" r="0.9">
      <stop offset="0" stop-color="#8A6A55" stop-opacity="0.50"/>
      <stop offset="0.55" stop-color="#8A6A55" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glyph" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#FFD27A"/>
      <stop offset="0.5" stop-color="#FF9A55"/>
      <stop offset="1" stop-color="#F2563E"/>
    </linearGradient>
    <linearGradient id="glyphHi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF6E8" stop-opacity="0.85"/>
      <stop offset="0.22" stop-color="#FFF6E8" stop-opacity="0"/>
    </linearGradient>
    <filter id="tileShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.50"/>
    </filter>
    <filter id="glyphGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#FF7A3C" flood-opacity="0.40"/>
    </filter>
    <clipPath id="squircleClip">
      <path d="M256 24 C 120 24, 88 24, 56 56 C 24 88, 24 120, 24 256 C 24 392, 24 424, 56 456 C 88 488, 120 488, 256 488 C 392 488, 424 488, 456 456 C 488 424, 488 392, 488 256 C 488 120, 488 88, 456 56 C 424 24, 392 24, 256 24 Z"/>
    </clipPath>
  </defs>

  <g filter="url(#tileShadow)">
    <path d="M256 24 C 120 24, 88 24, 56 56 C 24 88, 24 120, 24 256 C 24 392, 24 424, 56 456 C 88 488, 120 488, 256 488 C 392 488, 424 488, 456 456 C 488 424, 488 392, 488 256 C 488 120, 488 88, 456 56 C 424 24, 392 24, 256 24 Z" fill="url(#tile)"/>
  </g>

  <g clip-path="url(#squircleClip)">
    <rect x="24" y="24" width="464" height="464" fill="url(#sheen)"/>
    <rect x="24" y="300" width="464" height="188" fill="#000000" opacity="0.18"/>
  </g>

  <g filter="url(#glyphGlow)">
    <g fill="url(#glyph)">
      <path d="M132 132 L 196 132 L 290 256 L 226 256 Z"/>
      <path d="M380 132 L 316 132 L 222 256 L 286 256 Z"/>
      <path d="M226 240 L 286 240 L 286 348 L 226 348 Z"/>
      <path d="M182 332 L 330 332 L 256 430 Z"/>
    </g>
    <g fill="url(#glyphHi)">
      <path d="M132 132 L 196 132 L 218 161 L 154 161 Z"/>
      <path d="M380 132 L 316 132 L 294 161 L 358 161 Z"/>
    </g>
  </g>
</svg>
</body>
</html>
