<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yank</title>
<style>
  html, body { margin: 0; padding: 0; }
  body { width: 512px; height: 512px; overflow: hidden; }
  svg { display: block; }
</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warm paper tile -->
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FCFCFA"/>
      <stop offset="1" stop-color="#ECEAE3"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.02" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Deep ink with a teal heritage tint -->
    <linearGradient id="ink" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#1E2A2C"/>
      <stop offset="1" stop-color="#10595A"/>
    </linearGradient>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <clipPath id="squircle">
      <rect x="32" y="24" width="448" height="448" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <g filter="url(#tileShadow)">
    <rect x="32" y="24" width="448" height="448" rx="100" ry="100" fill="url(#tile)"/>
  </g>

  <g clip-path="url(#squircle)">
    <rect x="32" y="24" width="448" height="448" fill="url(#sheen)"/>

    <g fill="none" stroke="url(#ink)" stroke-width="50"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M176 170 L256 308"/>
      <path d="M336 170 L236 343 Q206 396 162 388"/>
    </g>
  </g>

  <rect x="32.5" y="24.5" width="447" height="447" rx="99.5" ry="99.5"
        fill="none" stroke="#000000" stroke-opacity="0.08" stroke-width="1"/>
</svg>
</body>
</html>
