<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yank</title>
<style>
  html, body { margin: 0; padding: 0; }
  body { width: 512px; height: 512px; overflow: hidden; }
  svg { display: block; }
</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep terminal graphite tile with cool top light -->
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2D3340"/>
      <stop offset="0.55" stop-color="#1B1E27"/>
      <stop offset="1" stop-color="#121420"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.02" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Mint -> cyan for the y -->
    <linearGradient id="ink" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#7BFFD0"/>
      <stop offset="1" stop-color="#27D9DE"/>
    </linearGradient>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="squircle">
      <rect x="32" y="24" width="448" height="448" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <g filter="url(#tileShadow)">
    <rect x="32" y="24" width="448" height="448" rx="100" ry="100" fill="url(#tile)"/>
  </g>

  <g clip-path="url(#squircle)">
    <rect x="32" y="24" width="448" height="448" fill="url(#sheen)"/>

    <!-- Monospace lowercase "y": two thick rounded diagonals.
         Left arm + right arm meet at x-height baseline; right arm
         continues as a long descender. Reads instantly at 16px. -->
    <g fill="none" stroke="url(#ink)" stroke-width="50"
       stroke-linecap="round" stroke-linejoin="round">
      <!-- left diagonal: top-left down to the join -->
      <path d="M176 170 L256 308"/>
      <!-- right diagonal + descender: top-right down through the join,
           continuing into a long tail with a slight curl left -->
      <path d="M336 170 L236 343 Q206 396 162 388"/>
    </g>
  </g>

  <rect x="32.5" y="24.5" width="447" height="447" rx="99.5" ry="99.5"
        fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
</svg>
</body>
</html>
