<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yank</title>
<style>
  html, body { margin: 0; padding: 0; }
  body { width: 512px; height: 512px; overflow: hidden; }
  svg { display: block; }
</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Near-black terminal tile -->
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#23262E"/>
      <stop offset="0.6" stop-color="#15171D"/>
      <stop offset="1" stop-color="#0C0D12"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.02" r="0.95">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cursor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6BFFC6"/>
      <stop offset="1" stop-color="#23D7DC"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <clipPath id="squircle">
      <rect x="32" y="24" width="448" height="448" rx="100" ry="100"/>
    </clipPath>
  </defs>

  <g filter="url(#tileShadow)">
    <rect x="32" y="24" width="448" height="448" rx="100" ry="100" fill="url(#tile)"/>
  </g>

  <g clip-path="url(#squircle)">
    <rect x="32" y="24" width="448" height="448" fill="url(#sheen)"/>

    <!-- White monospace "y", slightly tightened to make room for the cursor -->
    <g fill="none" stroke="#EEF1F6" stroke-width="46"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M158 174 L230 300"/>
      <path d="M302 174 L212 332 Q186 380 148 373"/>
    </g>

    <!-- Block cursor trailing the y, x-height aligned -->
    <g filter="url(#glow)">
      <rect x="306" y="190" width="64" height="112" rx="12" fill="url(#cursor)"/>
    </g>
  </g>

  <rect x="32.5" y="24.5" width="447" height="447" rx="99.5" ry="99.5"
        fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1"/>
</svg>
</body>
</html>
