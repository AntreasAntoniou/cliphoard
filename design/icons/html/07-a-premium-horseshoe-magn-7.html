<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yank</title>
<style>
  html,body{margin:0;padding:0;}
  body{width:512px;height:512px;overflow:hidden;background:transparent;}
  svg{display:block;}
</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Tile background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A2E8C"/>
      <stop offset="0.45" stop-color="#4B33C9"/>
      <stop offset="1" stop-color="#6C3DF4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.36" r="0.75">
      <stop offset="0" stop-color="#8C6BFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8C6BFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Brushed steel for the magnet body -->
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#AEB6CC"/>
      <stop offset="0.18" stop-color="#F4F7FF"/>
      <stop offset="0.5" stop-color="#D5DBEC"/>
      <stop offset="0.82" stop-color="#F4F7FF"/>
      <stop offset="1" stop-color="#9AA3BE"/>
    </linearGradient>
    <linearGradient id="steelTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Pole caps -->
    <linearGradient id="redCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF6E77"/>
      <stop offset="1" stop-color="#E8323E"/>
    </linearGradient>
    <linearGradient id="blueCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#56A0FF"/>
      <stop offset="1" stop-color="#1E66E8"/>
    </linearGradient>

    <!-- Soft drop shadow under the tile -->
    <filter id="tileShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
    <!-- Shadow under the magnet glyph -->
    <filter id="glyphShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1A1248" flood-opacity="0.45"/>
    </filter>

    <!-- Clip for the magnet U so caps sit flush -->
    <clipPath id="leftLegClip">
      <rect x="146" y="318" width="64" height="60"/>
    </clipPath>
    <clipPath id="rightLegClip">
      <rect x="302" y="318" width="64" height="60"/>
    </clipPath>
  </defs>

  <!-- Squircle tile -->
  <g filter="url(#tileShadow)">
    <rect x="24" y="24" width="464" height="464" rx="104" ry="104" fill="url(#bg)"/>
    <rect x="24" y="24" width="464" height="464" rx="104" ry="104" fill="url(#glow)"/>
    <!-- top sheen -->
    <rect x="24" y="24" width="464" height="200" rx="104" ry="104" fill="#FFFFFF" opacity="0.06"/>
  </g>

  <!-- Magnetic field arcs (subtle "pull") -->
  <g stroke="#FFFFFF" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M178 300 Q256 196 334 300" stroke-width="9" opacity="0.16"/>
    <path d="M196 300 Q256 226 316 300" stroke-width="9" opacity="0.10"/>
  </g>

  <!-- Magnet glyph -->
  <g filter="url(#glyphShadow)">
    <!-- Horseshoe body: outer U minus inner U -->
    <path d="M146 300
             a110 110 0 0 1 220 0
             v60
             h-64
             v-60
             a46 46 0 0 0 -92 0
             v60
             h-64
             z"
          fill="url(#steel)"
          stroke="#7E87A3" stroke-width="2"/>

    <!-- Top highlight band on the arc -->
    <path d="M150 296
             a106 106 0 0 1 212 0"
          fill="none" stroke="url(#steelTop)" stroke-width="20" stroke-linecap="round" opacity="0.7"/>

    <!-- Pole caps -->
    <g clip-path="url(#leftLegClip)">
      <rect x="146" y="318" width="64" height="62" fill="url(#redCap)"/>
    </g>
    <g clip-path="url(#rightLegClip)">
      <rect x="302" y="318" width="64" height="62" fill="url(#blueCap)"/>
    </g>

    <!-- thin separation lines above caps -->
    <rect x="146" y="316" width="64" height="3" fill="#7E87A3" opacity="0.6"/>
    <rect x="302" y="316" width="64" height="3" fill="#7E87A3" opacity="0.6"/>
  </g>
</svg>
</body>
</html>
