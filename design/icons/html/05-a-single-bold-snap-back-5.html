<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yank</title>
<style>
  html,body{margin:0;padding:0;}
  body{width:512px;height:512px;overflow:hidden;background:transparent;}
  svg{display:block;}
</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#222B3C"/>
      <stop offset="0.5" stop-color="#161D2A"/>
      <stop offset="1" stop-color="#0B0E16"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34E0C4"/>
      <stop offset="0.55" stop-color="#22C5DA"/>
      <stop offset="1" stop-color="#18A8FF"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.32" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="tileShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- macOS squircle tile -->
  <g filter="url(#tileShadow)">
    <rect x="40" y="32" width="432" height="432" rx="100" ry="100" fill="url(#tile)"/>
    <rect x="40" y="32" width="432" height="432" rx="100" ry="100" fill="url(#sheen)"/>
    <rect x="40.75" y="32.75" width="430.5" height="430.5" rx="99.5" ry="99.5"
          fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
  </g>

  <!-- snap-back return loop arrow -->
  <g filter="url(#glow)">
    <!-- the round-trip curve: out from origin, around the loop, back -->
    <path d="M 188 318
             C 188 232, 244 176, 320 176
             C 392 176, 392 280, 318 280
             C 270 280, 250 250, 250 218"
          fill="none" stroke="url(#arrow)" stroke-width="34"
          stroke-linecap="round"/>
    <!-- arrowhead snapping back to origin -->
    <path d="M 210 232 L 250 196 L 290 232"
          fill="none" stroke="url(#arrow)" stroke-width="34"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- origin / clip dot where it returns -->
  <circle cx="188" cy="318" r="23" fill="#0B0E16"/>
  <circle cx="188" cy="318" r="15" fill="#ffffff"/>
</svg>
</body>
</html>
