<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yank</title>
<style>
  html, body { margin: 0; padding: 0; }
  body { width: 512px; height: 512px; margin: 0; overflow: hidden; background: transparent; }
  svg { display: block; }
</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#2A2E4A"/>
      <stop offset="0.5" stop-color="#1C1E33"/>
      <stop offset="1"   stop-color="#121324"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.04" r="0.95">
      <stop offset="0"   stop-color="#5A6CFF" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#5A6CFF" stop-opacity="0.06"/>
      <stop offset="1"   stop-color="#5A6CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#2FB6FF"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D9E0F2"/>
    </linearGradient>
    <filter id="tileShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
    <filter id="accentGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#2FB6FF" flood-opacity="0.55"/>
    </filter>
    <filter id="boardShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#05060F" flood-opacity="0.50"/>
    </filter>
    <clipPath id="tileClip">
      <rect x="32" y="32" width="448" height="448" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <g filter="url(#tileShadow)">
    <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#tile)"/>
  </g>
  <g clip-path="url(#tileClip)">
    <rect x="32" y="32" width="448" height="448" fill="url(#sheen)"/>
    <rect x="33" y="33" width="446" height="446" rx="95" ry="95"
          fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>
  </g>

  <g filter="url(#boardShadow)">
    <rect x="160" y="176" width="192" height="208" rx="36" ry="36" fill="url(#board)"/>
  </g>

  <g fill="#A6B0CC">
    <rect x="196" y="288" width="120" height="16" rx="8"/>
    <rect x="196" y="328" width="120" height="16" rx="8"/>
    <rect x="196" y="368" width="72"  height="16" rx="8"/>
  </g>

  <g filter="url(#accentGlow)">
    <!-- clip clamp head over the board's top edge -->
    <rect x="214" y="152" width="84" height="40" rx="20" fill="url(#accent)"/>
    <!-- stem + arrow as one continuous pull token -->
    <rect x="240" y="180" width="32" height="40" rx="16" fill="url(#accent)"/>
    <path d="M256 268 L210 214 Q202 204 215 204 L297 204 Q310 204 302 214 Z" fill="url(#accent)"/>
  </g>
</svg>
</body>
</html>
