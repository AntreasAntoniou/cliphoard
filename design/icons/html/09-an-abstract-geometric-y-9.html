<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yank</title>
<style>
  html,body{margin:0;padding:0;}
  body{width:512px;height:512px;overflow:hidden;background:transparent;}
  svg{display:block;}
</style>
</head>
<body>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Tile background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#311C5A"/>
      <stop offset="0.55" stop-color="#23153F"/>
      <stop offset="1" stop-color="#170F2A"/>
    </linearGradient>
    <!-- subtle diagonal sheen -->
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- glyph gradient -->
    <linearGradient id="glyph" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7DF7C9"/>
      <stop offset="0.5" stop-color="#42E6C6"/>
      <stop offset="1" stop-color="#23C7E8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#39E8C9" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#39E8C9" stop-opacity="0"/>
    </radialGradient>

    <!-- squircle clip -->
    <clipPath id="tile">
      <path d="M256 16
               C 120 16, 16 120, 16 256
               C 16 392, 120 496, 256 496
               C 392 496, 496 392, 496 256
               C 496 120, 392 16, 256 16 Z"/>
    </clipPath>

    <filter id="ds" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0A2A28" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- TILE -->
  <g filter="url(#ds)">
    <path d="M256 16 C 120 16, 16 120, 16 256 C 16 392, 120 496, 256 496
             C 392 496, 496 392, 496 256 C 496 120, 392 16, 256 16 Z" fill="url(#bg)"/>
  </g>

  <g clip-path="url(#tile)">
    <rect x="0" y="0" width="512" height="512" fill="url(#sheen)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>

    <!-- MOTION TRACK: three clip-bars being pulled toward the hook -->
    <g>
      <rect x="120" y="243" width="56"  height="26" rx="13" fill="#FFFFFF" opacity="0.22"/>
      <rect x="156" y="243" width="74"  height="26" rx="13" fill="#FFFFFF" opacity="0.42"/>
      <rect x="200" y="243" width="96"  height="26" rx="13" fill="#FFFFFF" opacity="0.70"/>
    </g>

    <!-- THE MARK: abstract Y-hook / retrieval chevron -->
    <g filter="url(#soft)">
      <!-- main stroked path forming a Y that curls into a hook -->
      <path d="M270 150
               L 318 150
               L 358 250
               C 372 286, 350 332, 312 348
               C 286 360, 256 354, 240 332"
            fill="none" stroke="url(#glyph)" stroke-width="46"
            stroke-linecap="round" stroke-linejoin="round"/>
      <!-- left fork of the Y -->
      <path d="M270 150 L 318 250"
            fill="none" stroke="url(#glyph)" stroke-width="46"
            stroke-linecap="round" stroke-linejoin="round"/>
      <!-- arrowhead: pulling-back motion at hook tip -->
      <path d="M240 332 L 214 354 M240 332 L 262 360"
            fill="none" stroke="url(#glyph)" stroke-width="46"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- crisp inner highlight on the mark -->
    <path d="M270 150 L 318 150"
          fill="none" stroke="#FFFFFF" stroke-width="10"
          stroke-linecap="round" opacity="0.35"/>

    <!-- top inner rim light -->
    <path d="M256 22 C 128 22, 22 128, 22 256" fill="none"
          stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="3"/>
  </g>
</svg>
</body>
</html>
